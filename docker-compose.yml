version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: syncspace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-syncspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syncspace_password}
      POSTGRES_DB: ${POSTGRES_DB:-syncspace_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syncspace} -d ${POSTGRES_DB:-syncspace_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: syncspace_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: syncspace_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-syncspace}:${POSTGRES_PASSWORD:-syncspace_password}@postgres:5432/${POSTGRES_DB:-syncspace_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
    env_file:
      - ./apps/api/.env
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: syncspace_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    env_file:
      - ./apps/web/.env.local
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
